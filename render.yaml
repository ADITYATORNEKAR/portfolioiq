services:
  - type: web
    name: hft-causal-platform
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DB_PATH
        value: /tmp/hft_causal.db
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/v1/health
