version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# HFT Causal Platform — Local Development Stack (100% free)
# No PostgreSQL — uses SQLite stored in a Docker volume
#
# Usage:
#   cp backend/.env.example backend/.env  (fill in free API keys)
#   docker-compose up --build
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000
# API Docs: http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
      - ./backend:/app   # hot-reload in dev
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
      - DB_PATH=/data/hft_causal.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  sqlite_data:
    driver: local