name: CI — Tests, Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (for scientific libs)
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (pylint — errors & fatal only)
        run: pylint backend/app/ --disable=all --enable=E,F
        continue-on-error: true

      - name: Format check (black)
        run: black --check backend/app/
        continue-on-error: true

      - name: Run unit tests (no network — synthetic data only)
        run: pytest backend/tests/test_causal_service.py -v --tb=short
        env:
          PYTHONPATH: backend

      - name: Run API tests
        run: pytest backend/tests/test_api.py -v --tb=short -k "not analyze"
        env:
          PYTHONPATH: backend

  # ── Security ─────────────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/app/ -ll -x backend/app/services/agent_service.py

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: TypeScript type check
        run: npm run type-check
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://hft-causal-platform.fly.dev
